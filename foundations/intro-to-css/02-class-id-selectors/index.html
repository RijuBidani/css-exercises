<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class and ID Selectors</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <p class="odd">Number 1 - I'm a class!</p>
    <div id="two">Number 2 - I'm one ID.</div>
    <!-- what I originally did. Problem: elements 3, 4 same font size, so since only difference between 3 and other
     odd elements font size, the second class for 3 concerns only font size, and can be applied to 4 as well. So
     from solution, add class adjust-font-size to both 3 and 4. -->
    <!-- <p class="odd three">Number 3 - I'm a class, but cooler!</p> -->
    <p class="odd adjust-font-size">Number 3 - I'm a class, but cooler!</p>
    <!-- changed, originally just id="four", now that and class="adjust-font-size" -->
    <div id="four" class="adjust-font-size">Number 4 - I'm another ID.</div>
    <p class="odd">Number 5 - I'm a class!</p>
  </body>
</html>
